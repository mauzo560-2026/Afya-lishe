<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFYA-LISHE SMART — JOS Natural Herbs</title>
    <!-- CSS: Tailwind, Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --brand-green: #1a6b3c;
            --brand-amber: #c97b1a;
        }
        body { font-family: 'DM Sans', sans-serif; background-color: #f4f7f2; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .bg-brand-green { background-color: var(--brand-green); }
        .text-brand-green { color: var(--brand-green); }
        .bg-brand-amber { background-color: var(--brand-amber); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA: MIMEA STORE ---
        const MIMEA = [
            { id: 0, emoji: '🎃', name: 'Mbegu za Maboga', latin: 'Cucurbita pepo', cat: 'Nguvu', rating: 4.9, faida: 'Inaboresha nguvu za kiume na afya ya tezi dume.' },
            { id: 1, emoji: '🫚', name: 'Tangawizi', latin: 'Zingiber officinale', cat: 'Damu', rating: 4.8, faida: 'Inasafisha damu na kuimarisha mzunguko.' },
            { id: 2, emoji: '🌿', name: 'Moringa', latin: 'Moringa oleifera', cat: 'Lishe', rating: 4.9, faida: 'Ina vitamin nyingi na kuupa mwili kinga.' },
            { id: 3, emoji: '🧄', name: 'Vitunguu Saumu', latin: 'Allium sativum', cat: 'Nguvu', rating: 4.7, faida: 'Inashusha shinikizo la damu na kuua vimelea.' },
            { id: 4, emoji: '🌾', name: 'Fenugreek (Hulba)', latin: 'Trigonella foenum-graecum', cat: 'Uzazi', rating: 4.8, faida: 'Inasaidie usawa wa homoni kwa wanaume na wanawake.' },
            { id: 5, emoji: '🍂', name: 'Mdalasini', latin: 'Cinnamomum verum', cat: 'Akili', rating: 4.6, faida: 'Inasaidia kurekebisha sukari kwenye damu.' }
        ];

        // --- COMPONENT: APP ---
        function App() {
            const [screen, setScreen] = useState('welcome');
            const [user, setUser] = useState(null);
            const [selectedHerb, setSelectedHerb] = useState(null);

            // Auth Check
            useEffect(() => {
                const saved = localStorage.getItem('afya_user');
                if (saved) { setUser(JSON.parse(saved)); setScreen('home'); }
            }, []);

            const login = (name) => {
                const u = { name, email: 'user@example.com', premium: false, uchunguzi: 0 };
                setUser(u);
                localStorage.setItem('afya_user', JSON.stringify(u));
                setScreen('home');
            };

            const logout = () => { setUser(null); localStorage.removeItem('afya_user'); setScreen('welcome'); };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl relative overflow-hidden">
                    {/* Welcome Screen */}
                    {screen === 'welcome' && (
                        <div className="h-screen bg-brand-green flex flex-col items-center justify-center p-8 text-center text-white">
                            <div className="w-24 h-24 bg-white/10 rounded-[32px] flex items-center justify-center mb-6 backdrop-blur-md border border-white/20">
                                <span className="text-6xl">🌿</span>
                            </div>
                            <h1 className="text-4xl font-playfair font-black mb-2 leading-tight">AFYA-LISHE <span className="text-amber-400">SMART</span></h1>
                            <p className="text-white/70 text-sm mb-12 uppercase tracking-widest">Tiba ya Asili · Lishe · Nguvu</p>
                            <button onClick={() => setScreen('login')} className="w-full bg-white text-green-900 font-bold py-4 rounded-2xl shadow-xl transform active:scale-95 transition-all">
                                ANZA SAFARI YA AFYA →
                            </button>
                        </div>
                    )}

                    {/* Login Screen */}
                    {screen === 'login' && (
                        <div className="p-8 h-screen flex flex-col justify-center">
                            <h2 className="text-3xl font-playfair font-bold text-gray-900 mb-2">Karibu Tena</h2>
                            <p className="text-gray-500 mb-8">Ingiza jina lako ili kuanza</p>
                            <input id="userName" className="w-full bg-gray-100 p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-green-600" placeholder="Jina lako..." />
                            <button onClick={() => login(document.getElementById('userName').value || 'Mtumiaji')} className="w-full bg-brand-green text-white font-bold py-4 rounded-2xl shadow-lg ring-offset-2 active:scale-95 transition-all">
                                INGIA SASA
                            </button>
                            <button onClick={() => setScreen('welcome')} className="mt-4 text-gray-400 text-sm font-bold">RUDI NYUMA</button>
                        </div>
                    )}

                    {/* Main Home Screen */}
                    {user && screen === 'home' && (
                        <div className="p-6 pb-24">
                            <div className="flex justify-between items-center mb-8">
                                <div>
                                    <h2 className="text-2xl font-playfair font-bold text-gray-900">Habari, {user.name.split(' ')[0]}! 👋</h2>
                                    <p className="text-xs text-gray-400 font-bold tracking-widest uppercase mt-1">Hali ya afya yako leo?</p>
                                </div>
                                <div className="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-brand-green font-bold border border-green-100 shadow-sm" onClick={() => setScreen('akaunti')}>
                                    {user.name[0].toUpperCase()}
                                </div>
                            </div>

                            {/* Hero Card */}
                            <div className="bg-gradient-to-br from-green-800 to-green-600 p-6 rounded-[32px] text-white shadow-xl mb-8 relative overflow-hidden">
                                <div className="relative z-10">
                                    <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block">🔬 Uchunguzi Bure</span>
                                    <h3 className="text-xl font-playfair font-bold mb-2">Tathmini afya yako kisayansi</h3>
                                    <p className="text-white/70 text-xs mb-4">Maswali 10 ya kitaalamu kupata ripoti yako</p>
                                    <button className="bg-white text-green-900 px-6 py-2 rounded-xl text-xs font-black uppercase shadow-lg underline decoration-amber-500 underline-offset-2">Anza Sasa</button>
                                </div>
                            </div>

                            {/* Library Preview */}
                            <div className="flex justify-between items-center mb-4">
                                <h4 className="font-playfair font-bold text-lg">🌿 Mimea Maarufu</h4>
                                <button onClick={() => setScreen('maktaba')} className="text-xs font-bold text-brand-green uppercase tracking-tighter">Zote</button>
                            </div>
                            <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                                {MIMEA.map(m => (
                                    <div key={m.id} className="min-w-[140px] bg-white border border-gray-100 p-4 rounded-3xl shadow-sm text-center" onClick={() => { setSelectedHerb(m); setScreen('mmea'); }}>
                                        <div className="text-4xl mb-2">{m.emoji}</div>
                                        <h5 className="font-bold text-xs text-gray-800 mb-1">{m.name}</h5>
                                        <div className="flex items-center justify-center gap-1 text-[10px] font-bold text-amber-500">
                                            <span>⭐</span> {m.rating}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Library Screen */}
                    {screen === 'maktaba' && (
                        <div className="p-6 pb-24">
                            <div className="flex items-center gap-4 mb-6">
                                <button onClick={() => setScreen('home')} className="text-gray-400">←</button>
                                <h2 className="text-2xl font-playfair font-bold">Maktaba ya Mimea</h2>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {MIMEA.map(m => (
                                    <div key={m.id} className="bg-white border p-4 rounded-3xl text-center shadow-sm" onClick={() => { setSelectedHerb(m); setScreen('mmea'); }}>
                                        <div className="text-5xl mb-3">{m.emoji}</div>
                                        <h3 className="font-bold text-sm mb-1 uppercase tracking-tight">{m.name}</h3>
                                        <p className="text-[9px] text-gray-400 font-bold italic">{m.latin}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Herb Detail Screen */}
                    {screen === 'mmea' && selectedHerb && (
                        <div className="h-screen bg-white">
                            <div className="bg-green-50 p-12 text-center relative">
                                <button onClick={() => setScreen('home')} className="absolute top-6 left-6 text-green-800 text-xl font-bold">←</button>
                                <div className="text-8xl mb-4">{selectedHerb.emoji}</div>
                                <h2 className="text-3xl font-playfair font-bold text-green-900">{selectedHerb.name}</h2>
                                <p className="text-green-600 italic text-sm">{selectedHerb.latin}</p>
                            </div>
                            <div className="p-8">
                                <h4 className="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">FAIDA NA MATUMIZI</h4>
                                <p className="text-gray-600 leading-relaxed font-medium">{selectedHerb.faida}</p>
                                <div className="mt-8 bg-green-50 p-6 rounded-3xl border border-green-100">
                                    <p className="text-xs font-bold text-green-900">💡 Ushauri wa Dr. Revo:</p>
                                    <p className="text-xs text-green-700 mt-2">Tumia kijiko kimoja asubuhi kwa maji ya moto kwa matokeo bora zaidi ndani ya siku 14.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Account Screen */}
                    {screen === 'akaunti' && (
                        <div className="p-8 pb-24 text-center">
                            <div className="w-24 h-24 bg-brand-green text-white rounded-[40px] flex items-center justify-center text-4xl font-bold mx-auto mb-4 border-4 border-white shadow-2xl">
                                {user.name[0].toUpperCase()}
                            </div>
                            <h2 className="text-2xl font-playfair font-bold">{user.name}</h2>
                            <p className="text-gray-400 text-xs mb-8">{user.email}</p>
                            
                            <div className="text-left space-y-3">
                                <div className="bg-gray-50 p-5 rounded-2xl flex items-center justify-between">
                                    <span className="font-bold text-sm">Mipangilio</span>
                                    <span className="text-gray-300">›</span>
                                </div>
                                <div className="bg-gray-50 p-5 rounded-2xl flex items-center justify-between">
                                    <span className="font-bold text-sm">Msaada (WhatsApp)</span>
                                    <span className="text-gray-300">›</span>
                                </div>
                                <button onClick={logout} className="w-full bg-red-50 text-red-500 p-5 rounded-2xl font-bold text-sm text-left">
                                    🚪 Toka (Logout)
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    {user && (
                        <nav className="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex items-center justify-around py-4 shadow-2xl z-50">
                            <button onClick={() => setScreen('home')} className={`transition-all ${screen === 'home' ? 'text-green-700 scale-110' : 'text-gray-300'}`}>
                                <i className="lucide-home w-6 h-6"></i>
                            </button>
                            <button onClick={() => setScreen('maktaba')} className={`transition-all ${screen === 'maktaba' ? 'text-green-700 scale-110' : 'text-gray-300'}`}>
                                <i className="lucide-database w-6 h-6"></i>
                            </button>
                             <button className="bg-brand-green text-white p-3 rounded-2xl -mt-8 shadow-xl shadow-green-200">
                                <i className="lucide-camera w-7 h-7"></i>
                            </button>
                            <button className="text-gray-300"><i className="lucide-activity w-6 h-6"></i></button>
                            <button onClick={() => setScreen('akaunti')} className={`transition-all ${screen === 'akaunti' ? 'text-green-700 scale-110' : 'text-gray-300'}`}>
                                <i className="lucide-user w-6 h-6"></i>
                            </button>
                        </nav>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Init Lucide
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
