<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFYA-LISHE: JOS Natural Herbs</title>
    
    <!-- Scripts za lazima (React & Tailwind) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        /* CSS yako na Maboresho ya Muonekano */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #059669;
            --primary-light: #ecfdf5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .page-wrap {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .tb-logo {
            font-weight: 800;
            font-size: 18px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 24px 10px;
            border-top: 1px solid #f1f5f9;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon-wrap {
            padding: 8px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .nav-item.active .nav-icon-wrap {
            background: var(--primary-light);
        }

        .home-hero {
            padding: 20px;
            background: linear-gradient(180deg, #ecfdf5 0%, #ffffff 100%);
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 20px;
        }

        .herb-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #f1f5f9;
            transition: all 0.3s;
        }

        .category-pill {
            padding: 8px 16px;
            border-radius: 99px;
            background: #f1f5f9;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
        }

        .category-pill.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-up {
            animation: slideUp 0.5s ease forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Tunatumia Babel ili kodi ya React (JSX) ifanye kazi kwenye file moja
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Mfumo wa AI Chat (AIChat.tsx imeingizwa hapa) ---
        const AIChat = () => {
            const [messages, setMessages] = useState([
                { id: 1, text: "Habari! Mimi ni mshauri wako wa mitishamba. Una tatizo gani la kiafya leo?", sender: 'ai' }
            ]);
            const [input, setInput] = useState('');

            const sendMessage = () => {
                if (!input.trim()) return;
                const userMsg = { id: Date.now(), text: input, sender: 'user' };
                setMessages([...messages, userMsg]);
                setInput('');
                
                // Simulating AI Response based on simple keywords
                setTimeout(() => {
                    let response = "Samahani, sijakuelewa vizuri. Unaweza kuelezea dalili zako vizuri au taja jina la mmea?";
                    if(input.toLowerCase().includes('tumbo')) response = "Kwa maumivu ya tumbo, Mlonge (Moringa) au Tangawizi hufanya kazi vizuri sana. Je, ungependa kujua jinsi ya kutumia?";
                    if(input.toLowerCase().includes('kichwa')) response = "Maumivu ya kichwa yanaweza kutibiwa kwa kutumia mafuta ya Mkaratusi au kunywa chai ya Mchaichai.";
                    
                    setMessages(prev => [...prev, { id: Date.now()+1, text: response, sender: 'ai' }]);
                }, 1000);
            };

            return (
                <div className="flex flex-col h-[70vh]">
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map(m => (
                            <div key={m.id} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.sender === 'user' ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-gray-100 text-gray-800 rounded-tl-none'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 border-t flex gap-2">
                        <input 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                            placeholder="Andika tatizo hapa..."
                            className="flex-1 bg-gray-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500"
                        />
                        <button onClick={sendMessage} className="bg-emerald-600 text-white p-3 rounded-xl">
                            <i data-lucide="send" className="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- Mfumo wa Scanner (PlantScanner.tsx imeingizwa hapa) ---
        const PlantScanner = () => {
            const [scanning, setScanning] = useState(false);
            const [result, setResult] = useState(null);

            const startScan = () => {
                setScanning(true);
                setTimeout(() => {
                    setScanning(false);
                    setResult({
                        name: "Aloe Vera (Shubiri)",
                        uses: "Hutibu muwasho wa ngozi, vidonda, na husaidia mfumo wa chakula.",
                        confidence: "98%"
                    });
                }, 3000);
            };

            return (
                <div className="p-6 text-center">
                    <div className={`relative w-64 h-64 mx-auto bg-gray-100 rounded-3xl overflow-hidden border-4 ${scanning ? 'border-emerald-500' : 'border-white'} transition-all`}>
                        {scanning && <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500 shadow-[0_0_15px_#10b981] animate-[bounce_2s_infinite]"></div>}
                        <div className="flex items-center justify-center h-full text-gray-400">
                           {result ? <div className="p-4 text-emerald-700 font-bold">{result.name}</div> : "Picha Itaonekana Hapa"}
                        </div>
                    </div>
                    
                    {!scanning && !result && (
                        <button onClick={startScan} className="mt-8 bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl flex items-center gap-2 mx-auto">
                           Anza Kuscan Mmea
                        </button>
                    )}

                    {result && (
                        <div className="mt-6 p-4 bg-emerald-50 rounded-2xl border border-emerald-100 animate-up">
                            <h3 className="font-bold text-emerald-900">{result.name}</h3>
                            <p className="text-sm text-emerald-700 mt-1">{result.uses}</p>
                            <button onClick={() => setResult(null)} className="mt-4 text-xs text-emerald-600 underline">Jaribu Tena</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- App Kuu (Kutoka App.tsx) ---
        const App = () => {
            const [tab, setTab] = useState('nyumbani');
            const [category, setCategory] = useState('Zote');

            // Initialize Lucide icons
            useEffect(() => {
                const lucide = window.lucide;
                if (lucide) lucide.createIcons();
            }, [tab]);

            return (
                <div className="page-wrap">
                    {/* Top Bar */}
                    <nav className="topbar">
                        <div>
                            <div className="tb-logo">🌿 AFYA-LISHE</div>
                            <div className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">JOS Natural Herbs</div>
                        </div>
                        <div className="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600 cursor-pointer">
                            <i data-lucide="user" className="w-5 h-5"></i>
                        </div>
                    </nav>

                    <div className="pb-32">
                        {tab === 'nyumbani' && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} key="home">
                                <div className="home-hero">
                                    <h1 className="text-2xl font-bold leading-tight">Gundua Nguvu ya <span className="text-emerald-600">Mimea Asili</span> Leo.</h1>
                                    <p className="text-gray-500 text-sm mt-2">Dawa asili kwa afya yako na familia yako.</p>
                                    
                                    <div className="mt-6 flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                                        {['Zote', 'Tumbo', 'Ngozi', 'Nguvu', 'Kinga'].map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setCategory(cat)}
                                                className={`category-pill ${category === cat ? 'active' : ''}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="card-grid mt-2">
                                    <div className="herb-card animate-up">
                                        <div className="w-full aspect-square bg-emerald-50 rounded-xl mb-3 flex items-center justify-center text-2xl">🌱</div>
                                        <h4 className="font-bold text-sm">Mlonge (Moringa)</h4>
                                        <p className="text-[10px] text-gray-400">Tiba ya magonjwa 300+</p>
                                    </div>
                                    <div className="herb-card animate-up" style={{animationDelay: '0.1s'}}>
                                        <div className="w-full aspect-square bg-emerald-50 rounded-xl mb-3 flex items-center justify-center text-2xl">🍯</div>
                                        <h4 className="font-bold text-sm">Asali ya Nyuki</h4>
                                        <p className="text-[10px] text-gray-400">Kinga ya mwili na kikohozi</p>
                                    </div>
                                    <div className="herb-card animate-up" style={{animationDelay: '0.2s'}}>
                                        <div className="w-full aspect-square bg-emerald-50 rounded-xl mb-3 flex items-center justify-center text-2xl">🍋</div>
                                        <h4 className="font-bold text-sm">Tangawizi & Ndimu</h4>
                                        <p className="text-[10px] text-gray-400">Mafua na koo</p>
                                    </div>
                                    <div className="herb-card animate-up" style={{animationDelay: '0.3s'}}>
                                        <div className="w-full aspect-square bg-emerald-50 rounded-xl mb-3 flex items-center justify-center text-2xl">🍵</div>
                                        <h4 className="font-bold text-sm">Mdalasini</h4>
                                        <p className="text-[10px] text-gray-400">Kusafisha damu</p>
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {tab === 'ai' && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} key="chat">
                                <div className="p-4 bg-emerald-50 border-b border-emerald-100">
                                    <h2 className="font-bold text-emerald-900">Mshauri wa AI</h2>
                                    <p className="text-xs text-emerald-600">Uliza chochote kuhusu afya na mitishamba</p>
                                </div>
                                <AIChat />
                            </motion.div>
                        )}

                        {tab === 'scan' && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} key="scan">
                                <div className="p-4 bg-emerald-50 border-b border-emerald-100 text-center">
                                    <h2 className="font-bold text-emerald-900">Scanner ya Mimea</h2>
                                    <p className="text-xs text-emerald-600">Piga picha mmea ili upate maelezo</p>
                                </div>
                                <PlantScanner />
                            </motion.div>
                        )}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="bottom-nav">
                        <div className={`nav-item ${tab === 'nyumbani' ? 'active' : ''}`} onClick={() => setTab('nyumbani')}>
                            <div className="nav-icon-wrap"><i data-lucide="home"></i></div>
                            Nyumbani
                        </div>
                        <div className={`nav-item ${tab === 'ai' ? 'active' : ''}`} onClick={() => setTab('ai')}>
                            <div className="nav-icon-wrap"><i data-lucide="message-circle"></i></div>
                            AI Chat
                        </div>
                        <div className={`nav-item ${tab === 'scan' ? 'active' : ''}`} onClick={() => setTab('scan')}>
                            <div className="nav-icon-wrap"><i data-lucide="camera"></i></div>
                            Scanner
                        </div>
                        <div className={`nav-item ${tab === 'duka' ? 'active' : ''}`} onClick={() => setTab('duka')}>
                            <div className="nav-icon-wrap"><i data-lucide="shopping-bag"></i></div>
                            Duka
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
