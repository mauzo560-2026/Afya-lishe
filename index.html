<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Afya-Lishe Smart | JOS Natural Herbs</title>
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.0/dist/index.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gr: #1a6b3c; --gr2: #124d2b; --gr3: #e6f5ee; --gr4: #b3dcc4; --gr5: #6dbf8b;
            --am: #c97b1a; --am2: #a35e0e; --am3: #fef3e2; --am4: #f5d58a;
            --bg: #f4f7f2; --bg2: #ebefea; --card: #fff; --card2: #f8faf6;
            --line: #dde3d7; --text: #1a2218; --sub: #4a5c42; --muted: #8a9a82;
            --red: #c0392b; --red3: #fdecea;
            --r: 12px; --rs: 10px; --rxs: 6px; --pill: 100px;
            --sh: 0 1px 4px rgba(0,0,0,.05); --sh2: 0 4px 16px rgba(0,0,0,.08);
            --shg: 0 4px 16px rgba(26,107,60,.18);
            --t: .2s cubic-bezier(.4, 0, .2, 1);
        }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .font-playfair { font-family: 'Playfair Display', serif; }

        .sc { display: none; min-height: 100vh; }
        .sc.on { display: block; }

        .btn { border: none; cursor: pointer; border-radius: var(--rs); transition: all var(--t); display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-weight: 700; }
        .btn-gr { background: var(--gr); color: #fff; padding: 10px 20px; font-size: 13px; box-shadow: var(--shg); }
        .btn-am { background: var(--am); color: #fff; padding: 10px 20px; font-size: 13px; }
        .btn-full { width: 100%; padding: 12px; font-size: 14px; }
        
        .inp { width: 100%; padding: 12px 16px; border: 1.5px solid var(--line); border-radius: var(--rs); font-size: 14px; outline: none; background: var(--card); }
        .inp:focus { border-color: var(--gr); }

        .topbar { position: sticky; top: 0; z-index: 200; height: 60px; background: rgba(255, 255, 255, 0.94); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; backdrop-filter: blur(10px); }
        .tb-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: var(--gr); }
        
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(255, 255, 255, 0.98); border-top: 1px solid var(--line); display: flex; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .nb { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); border: none; background: none; cursor: pointer; }
        .nb.on { color: var(--gr); }
        .nbic { font-size: 20px; }
        .nblb { font-size: 10px; font-weight: 700; }

        /* Welcome Section */
        .welcome { min-height: 100vh; background: linear-gradient(160deg, #0d3520 0%, #1a6b3c 100%); display: flex; flex-direction: column; padding: 40px 24px; color: white; text-align: center; justify-content: space-between; }
        
        /* Maktaba Cards */
        .mmea-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid var(--line); box-shadow: var(--sh); }
        .mmea-img { height: 120px; background: var(--gr3); display: flex; items-center; justify-center; font-size: 48px; }

        /* Ratiba Styles */
        .ratiba-day { background: white; border-radius: 16px; border: 1px solid var(--line); margin-bottom: 12px; overflow: hidden; }
        .r-head { background: var(--gr); color: white; padding: 12px 16px; font-weight: 800; font-size: 14px; }
        .r-session { display: flex; gap: 12px; padding: 12px; border-bottom: 1px solid #f0f0f0; }

        .ai-fab { position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--gr); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 100; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // ==========================================
        //  WEKA GEMINI API KEY YAKO HAPA CHINI
        // ==========================================
        const MY_GEMINI_KEY = ""; // Weka ufunguo wako hapa kati ya ""

        // --- Constants ---
        const MIMEA = [
            { id: 0, emoji: '🎃', name: 'Mbegu za Maboga', latin: 'Cucurbita pepo', cats: ['nguvu', 'uzazi'], rating: 4.9, reviews: 234, matumizi: 'Inaboresha nguvu za kiume, ina zinki nyingi kwa testosterone.', faida: ['Inaboresha nguvu za kiume', 'Ina zinki kwa uzazi', 'Antioxidants nyingi'], steps: [{t: 'Nunua', tx: 'Nunua mbegu safi.'}, {t: 'Saga', tx: 'Saga ziwe poda.'}], onyo: 'Wajawazito wapunguze kiasi.' },
            { id: 1, emoji: '🫚', name: 'Tangawizi', latin: 'Zingiber officinale', cats: ['damu', 'lishe'], rating: 4.8, reviews: 412, matumizi: 'Inaboresha mzunguko wa damu na kutibu uvimbe.', faida: ['Mzunguko wa damu', 'Mmengenyo', 'Kinga ya mwili'], steps: [{t: 'Kata', tx: 'Kata vipande vidogo.'}, {t: 'Chemsha', tx: 'Chemsha na asali.'}], onyo: 'Daktari akishauri epuka ukiwa na vidonda.' },
            { id: 2, emoji: '🌿', name: 'Moringa', latin: 'Moringa oleifera', cats: ['lishe', 'nguvu'], rating: 5.0, reviews: 2000, matumizi: 'Inajulikana kama mti wa uzima, inatibu magonjwa 300+.', faida: ['Multivitamin', 'Nishati', 'Kinga'], steps: [{t: 'Poda', tx: 'Kijiko 1 kila siku.'}], onyo: 'None.' }
            // Unaweza kuongeza mingine hapa...
        ];

        const RATIBA_ALL = {
            jumla: {
                title: '🌿 Ratiba ya Jumla ya Afya',
                desc: 'Programu ya siku 7 kwa afya bora ya mwezi mzima.',
                days: [
                    { siku: 'Siku 1', sessions: [{ t: '06:30', lbl: 'Asubuhi', title: 'Tangawizi + Asali', text: 'Kunywa kabla ya mlo.', pill: '🫚 Detox' }] },
                    { siku: 'Siku 2', sessions: [{ t: '06:30', lbl: 'Asubuhi', title: 'Vitunguu Saumu', text: 'Vitunguu 3 na asali.', pill: '🧄 Blood' }] }
                ]
            }
        };

        // --- Sub-components ---
        
        const AIChat = ({ isVisible, onClose }) => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);

            const send = async () => {
                if(!input.trim() || !MY_GEMINI_KEY) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);
                
                try {
                    // Logic ya Gemini hapa...
                    setTimeout(() => {
                        setMessages(prev => [...prev, { role: 'bot', text: 'Habari! Mimi ni Dr. Revo. Naomba API Key iwekwe kwenye kodi ili nijibu vizuri.' }]);
                        setLoading(false);
                    }, 1000);
                } catch(e) { setLoading(false); }
            };

            if(!isVisible) return null;
            return (
                <div className="fixed inset-0 bg-white z-[300] flex flex-col pt-10">
                    <div className="p-4 border-b flex justify-between items-center">
                        <button onClick={onClose} className="font-bold text-green-800">← Rudi</button>
                        <h2 className="font-bold">🌿 Dr. Revo AI</h2>
                        <div className="w-10"></div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.length === 0 && <p className="text-center text-gray-400 mt-10">Karibu! Nieleze unajisikiaje kisha nitakushauri.</p>}
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl ${m.role === 'user' ? 'bg-green-800 text-white' : 'bg-gray-100 text-gray-800'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 border-t flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} className="inp" placeholder="Andika hapa..." />
                        <button onClick={send} className="btn btn-gr">Tuma</button>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        function App() {
            const [screen, setScreen] = useState('welcome');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [selectedMmea, setSelectedMmea] = useState(null);

            const goto = (s) => { setScreen(s); window.scrollTo(0, 0); };

            return (
                <div className="min-h-screen">
                    <AnimatePresence mode="wait">
                        {screen === 'welcome' && (
                            <motion.div key="w" className="welcome" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                                <div>
                                    <div className="text-8xl mb-4">🌿</div>
                                    <h1 className="text-4xl font-black mb-2">AFYA-LISHE</h1>
                                    <p className="opacity-80">Tiba ya Asili na Lishe Bora kutoka JOS Natural Herbs</p>
                                </div>
                                <div className="space-y-3">
                                    <button onClick={() => goto('home')} className="w-full bg-white text-green-900 py-4 rounded-2xl font-black text-lg">Anza Sasa →</button>
                                    <p className="text-xs opacity-60">Imetengenezwa na Dr. Revo</p>
                                </div>
                            </motion.div>
                        )}

                        {screen === 'home' && (
                            <motion.div key="h" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="pb-24">
                                <nav className="topbar">
                                    <span className="tb-logo">🌿 AFYA-LISHE</span>
                                    <div className="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-xs">👤</div>
                                </nav>
                                
                                <div className="p-4">
                                    <div className="bg-green-800 p-6 rounded-3xl text-white mb-6">
                                        <h2 className="text-xl font-bold mb-1 font-playfair">Habari Rafiki 👋</h2>
                                        <p className="text-sm opacity-80 mb-4">Je, unataka kufanya uchunguzi wa afya yako leo?</p>
                                        <button onClick={() => goto('uchunguzi')} className="bg-white text-green-900 px-6 py-2 rounded-xl font-bold text-sm">Anza Uchunguzi</button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mb-8">
                                        <div onClick={() => goto('maktaba')} className="bg-white border p-4 rounded-2xl shadow-sm text-center">
                                            <div className="text-3xl mb-2">🌱</div>
                                            <div className="font-bold text-sm">Maktaba</div>
                                        </div>
                                        <div onClick={() => goto('ratiba')} className="bg-white border p-4 rounded-2xl shadow-sm text-center">
                                            <div className="text-3xl mb-2">📅</div>
                                            <div className="font-bold text-sm">Ratiba</div>
                                        </div>
                                    </div>

                                    <h3 className="font-bold mb-4 font-playfair">Mimea Inayopendekezwa</h3>
                                    <div className="space-y-3">
                                        {MIMEA.map(m => (
                                            <div key={m.id} onClick={() => { setSelectedMmea(m); goto('detail'); }} className="flex items-center gap-4 bg-white p-3 rounded-2xl border">
                                                <div className="text-3xl">{m.emoji}</div>
                                                <div>
                                                    <div className="font-bold text-sm">{m.name}</div>
                                                    <div className="text-[10px] text-gray-400 italic">{m.latin}</div>
                                                </div>
                                                <div className="ml-auto text-green-700">›</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {screen === 'maktaba' && (
                            <div className="p-4 pb-24">
                                <div className="flex items-center gap-4 mb-6">
                                    <button onClick={() => goto('home')} className="text-2xl">←</button>
                                    <h2 className="font-bold text-xl">Maktaba ya Mimea</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {MIMEA.map(m => (
                                        <div key={m.id} onClick={() => { setSelectedMmea(m); goto('detail'); }} className="mmea-card">
                                            <div className="mmea-img">{m.emoji}</div>
                                            <div className="p-3">
                                                <div className="font-bold text-sm">{m.name}</div>
                                                <div className="text-yellow-500 text-[10px]">⭐ {m.rating}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'detail' && selectedMmea && (
                            <div className="pb-24">
                                <div className="h-48 bg-green-50 flex items-center justify-center text-8xl relative">
                                    <button onClick={() => goto('maktaba')} className="absolute top-4 left-4 bg-white/80 w-10 h-10 rounded-full flex items-center justify-center font-bold">←</button>
                                    {selectedMmea.emoji}
                                </div>
                                <div className="p-6">
                                    <h2 className="text-2xl font-black mb-1">{selectedMmea.name}</h2>
                                    <p className="italic text-gray-400 mb-6">{selectedMmea.latin}</p>
                                    
                                    <div className="mb-6">
                                        <h3 className="font-bold border-b pb-2 mb-3">Maelezo</h3>
                                        <p className="text-sm leading-relaxed text-gray-600 font-medium">{selectedMmea.matumizi}</p>
                                    </div>

                                    <div className="mb-6">
                                        <h3 className="font-bold border-b pb-2 mb-3">Faida</h3>
                                        <div className="space-y-2">
                                            {selectedMmea.faida.map((f,i) => <div key={i} className="bg-green-50 p-2 rounded-lg text-xs font-bold text-green-800">✅ {f}</div>)}
                                        </div>
                                    </div>

                                    <button onClick={() => goto('home')} className="btn btn-gr btn-full">Rudi Nyumbani</button>
                                </div>
                            </div>
                        )}

                        {screen === 'ratiba' && (
                             <div className="p-4 pb-24">
                                <div className="flex items-center gap-4 mb-6">
                                    <button onClick={() => goto('home')} className="text-2xl">←</button>
                                    <h2 className="font-bold text-xl">Ratiba Yako</h2>
                                </div>
                                {RATIBA_ALL.jumla.days.map((d, i) => (
                                    <div key={i} className="ratiba-day">
                                        <div className="r-head uppercase tracking-wider">{d.siku}</div>
                                        {d.sessions.map((s, j) => (
                                            <div key={j} className="r-session">
                                                <div className="w-16 flex-shrink-0 text-center font-black text-green-700 text-xs">{s.t}</div>
                                                <div>
                                                    <div className="font-bold text-sm mb-1">{s.title}</div>
                                                    <p className="text-xs text-gray-500 font-medium">{s.text}</p>
                                                    <div className="mt-2 text-[10px] bg-green-50 px-2 py-1 rounded-full inline-block font-black text-green-900 border border-green-200">{s.pill}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                                <button className="btn btn-gr btn-full mt-4" onClick={() => alert('Ratiba imehifadhiwa!')}>📥 Pakua Ratiba (PDF)</button>
                             </div>
                        )}
                    </AnimatePresence>

                    {/* Nav ya chini */}
                    {screen !== 'welcome' && (
                        <nav className="bnav">
                            <button onClick={() => goto('home')} className={`nb ${screen === 'home' ? 'on' : ''}`}>
                                <span className="nbic">🏠</span><span className="nblb">Leo</span>
                            </button>
                            <button onClick={() => goto('maktaba')} className={`nb ${screen === 'maktaba' ? 'on' : ''}`}>
                                <span className="nbic">🍃</span><span className="nblb">Mimea</span>
                            </button>
                            <button onClick={() => goto('ratiba')} className={`nb ${screen === 'ratiba' ? 'on' : ''}`}>
                                <span className="nbic">📅</span><span className="nblb">Ratiba</span>
                            </button>
                        </nav>
                    )}

                    {/* AI FAB */}
                    {screen !== 'welcome' && (
                        <button onClick={() => setIsAiOpen(true)} className="ai-fab">🌿</button>
                    )}

                    <AIChat isVisible={isAiOpen} onClose={() => setIsAiOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
